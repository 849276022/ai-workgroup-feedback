<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI副业指南 - 用户反馈数据看板</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            padding: 40px 20px;
        }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { font-size: 16px; opacity: 0.9; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .stat-card .number {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }
        .stat-card .label {
            font-size: 14px;
            color: #6b7280;
        }
        .content-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e5e7eb;
        }
        .issue-list {
            list-style: none;
        }
        .issue-item {
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .issue-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }
        .issue-title {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .issue-meta {
            font-size: 12px;
            color: #6b7280;
        }
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 8px;
        }
        .tag-urgent { background: #fee2e2; color: #991b1b; }
        .tag-normal { background: #dbeafe; color: #1e40af; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 AI副业指南数据看板</h1>
            <p>实时查看用户反馈和需求分析</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="totalIssues">-</div>
                <div class="label">总反馈数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="urgentIssues">-</div>
                <div class="label">紧急需求</div>
            </div>
            <div class="stat-card">
                <div class="number" id="todayIssues">-</div>
                <div class="label">今日新增</div>
            </div>
        </div>

        <div class="content-section">
            <h2 class="section-title">📝 最新反馈</h2>
            <div id="issuesList" class="loading">加载中...</div>
        </div>
    </div>

    <script>
        // GitHub API 配置 - Token 需要从环境变量或配置中获取
        const REPO_OWNER = '849276022';
        const REPO_NAME = 'ai-workgroup-feedback';
        // 注意：实际使用时需要通过安全方式获取 Token

        async function loadData() {
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?state=all&per_page=100`);

                if (!response.ok) {
                    throw new Error('Failed to fetch data');
                }

                const issues = await response.json();
                
                // 统计数据
                document.getElementById('totalIssues').textContent = issues.length;
                
                const urgentCount = issues.filter(i => 
                    i.labels.some(l => l.name === '紧急')
                ).length;
                document.getElementById('urgentIssues').textContent = urgentCount;
                
                const today = new Date().toDateString();
                const todayCount = issues.filter(i => 
                    new Date(i.created_at).toDateString() === today
                ).length;
                document.getElementById('todayIssues').textContent = todayCount;
                
                // 显示列表
                const listHtml = issues.slice(0, 10).map(issue => {
                    const isUrgent = issue.labels.some(l => l.name === '紧急');
                    const tagClass = isUrgent ? 'tag-urgent' : 'tag-normal';
                    const tagText = isUrgent ? '紧急' : '一般';
                    
                    return `
                        <li class="issue-item">
                            <div class="issue-title">${issue.title}</div>
                            <div class="issue-meta">
                                <span class="tag ${tagClass}">${tagText}</span>
                                提交于 ${new Date(issue.created_at).toLocaleDateString('zh-CN')}
                            </div>
                        </li>
                    `;
                }).join('');
                
                document.getElementById('issuesList').innerHTML = `<ul class="issue-list">${listHtml}</ul>`;
                
            } catch (error) {
                document.getElementById('issuesList').innerHTML = `
                    <div class="error">
                        加载失败: ${error.message}<br>
                        请检查仓库权限或稍后重试
                    </div>
                `;
            }
        }

        loadData();
    </script>
</body>
</html>
